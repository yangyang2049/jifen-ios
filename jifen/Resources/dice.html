<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>骰子</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            width: 100vw;
            height: 100vh;
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            cursor: pointer;
        }

        #wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            flex-wrap: nowrap;
        }

        /* 1 颗：200px；2 颗：缩小防横向溢出 */
        #wrapper.count-1 .dice-unit {
            width: 200px;
            height: 200px;
        }

        #wrapper.count-1 .dice-unit:nth-child(n+2) {
            display: none;
        }

        #wrapper.count-2 {
            flex-wrap: nowrap;
            gap: 60px;
        }

        #wrapper.count-2 .dice-unit {
            width: 120px;
            height: 120px;
        }

        #wrapper.count-2 .dice-unit:nth-child(n+3) {
            display: none;
        }

        /* 2 颗：120px 立方体 half=60 */
        #wrapper.count-2 .dice-unit .dice {
            transform: translateZ(-60px);
        }
        #wrapper.count-2 .dice-unit .front { transform: translateZ(60px); }
        #wrapper.count-2 .dice-unit .front.inner { transform: translateZ(58px); }
        #wrapper.count-2 .dice-unit .back { transform: rotateX(-180deg) translateZ(60px); }
        #wrapper.count-2 .dice-unit .back.inner { transform: rotateX(-180deg) translateZ(58px); }
        #wrapper.count-2 .dice-unit .right { transform: rotateY(90deg) translateZ(60px); }
        #wrapper.count-2 .dice-unit .right.inner { transform: rotateY(90deg) translateZ(58px); }
        #wrapper.count-2 .dice-unit .left { transform: rotateY(-90deg) translateZ(60px); }
        #wrapper.count-2 .dice-unit .left.inner { transform: rotateY(-90deg) translateZ(58px); }
        #wrapper.count-2 .dice-unit .top { transform: rotateX(90deg) translateZ(60px); }
        #wrapper.count-2 .dice-unit .top.inner { transform: rotateX(90deg) translateZ(58px); }
        #wrapper.count-2 .dice-unit .bottom { transform: rotateX(-90deg) translateZ(60px); }
        #wrapper.count-2 .dice-unit .bottom.inner { transform: rotateX(-90deg) translateZ(58px); }

        @keyframes spin-60 {
            0% { transform: translateZ(-60px) rotateX(0deg) rotateY(0deg) rotateZ(0deg); }
            20% { transform: translateZ(-60px) rotateX(135deg) rotateY(135deg) rotateZ(0deg); }
            40% { transform: translateZ(-60px) rotateX(270deg) rotateY(70deg) rotateZ(135deg); }
            60% { transform: translateZ(-60px) rotateX(405deg) rotateY(270deg) rotateZ(270deg); }
            80% { transform: translateZ(-60px) rotateX(135deg) rotateY(405deg) rotateZ(200deg); }
            100% { transform: translateZ(-60px) rotateX(270deg) rotateY(270deg) rotateZ(270deg); }
        }
        #wrapper.count-2 .dice.rolling {
            animation: spin-60 1.4s ease-out forwards;
        }

        /* 3 颗：第一行一颗居中，第二行两颗并排；与 2 颗同尺寸 120px、间距 60px */
        #wrapper.count-3 {
            flex-wrap: wrap;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            gap: 60px;
            width: 100%;
            max-width: 100vw;
            box-sizing: border-box;
        }

        #wrapper.count-3 .dice-unit {
            width: 120px;
            height: 120px;
        }

        /* 第一颗独占第一行并居中 */
        #wrapper.count-3 .dice-unit:nth-child(1) {
            flex-basis: 100%;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        #wrapper.count-3 .dice-unit:nth-child(1) .platform {
            width: 120px;
            height: 120px;
            flex-shrink: 0;
        }

        /* 120px 立方体 half=60（与 2 颗一致） */
        #wrapper.count-3 .dice-unit .dice {
            transform: translateZ(-60px);
        }
        #wrapper.count-3 .dice-unit .front { transform: translateZ(60px); }
        #wrapper.count-3 .dice-unit .front.inner { transform: translateZ(58px); }
        #wrapper.count-3 .dice-unit .back { transform: rotateX(-180deg) translateZ(60px); }
        #wrapper.count-3 .dice-unit .back.inner { transform: rotateX(-180deg) translateZ(58px); }
        #wrapper.count-3 .dice-unit .right { transform: rotateY(90deg) translateZ(60px); }
        #wrapper.count-3 .dice-unit .right.inner { transform: rotateY(90deg) translateZ(58px); }
        #wrapper.count-3 .dice-unit .left { transform: rotateY(-90deg) translateZ(60px); }
        #wrapper.count-3 .dice-unit .left.inner { transform: rotateY(-90deg) translateZ(58px); }
        #wrapper.count-3 .dice-unit .top { transform: rotateX(90deg) translateZ(60px); }
        #wrapper.count-3 .dice-unit .top.inner { transform: rotateX(90deg) translateZ(58px); }
        #wrapper.count-3 .dice-unit .bottom { transform: rotateX(-90deg) translateZ(60px); }
        #wrapper.count-3 .dice-unit .bottom.inner { transform: rotateX(-90deg) translateZ(58px); }

        #wrapper.count-3 .dice.rolling {
            animation: spin-60 1.4s ease-out forwards;
        }

        .dice-unit {
            position: relative;
            flex-shrink: 0;
            perspective: 1200px;
        }

        .platform {
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
        }

        .platform.settling {
            transition: transform 0.6s cubic-bezier(0.2, 0, 0.2, 1);
        }

        .dice {
            position: absolute;
            width: 100%;
            height: 100%;
            left: 0;
            top: 0;
            transform-style: preserve-3d;
            transform: translateZ(-100px);
        }

        .dice.settling {
            transition: transform 0.6s cubic-bezier(0.2, 0, 0.2, 1);
        }

        .dice-unit .side {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #ffffff 0%, #f5f5f5 100%);
            box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.1);
            border-radius: 20%;
        }

        .dice-unit .inner {
            background: #f0f0f0;
            box-shadow: none;
        }

        .dice-unit .cover {
            background: #e8e8e8;
            box-shadow: none;
            border-radius: 0;
            transform: translateZ(0px);
        }

        .dice-unit .cover.x {
            transform: rotateY(90deg);
        }

        .dice-unit .cover.z {
            transform: rotateX(90deg);
        }

        .dice-unit .front {
            transform: translateZ(100px);
        }

        .dice-unit .front.inner {
            transform: translateZ(98px);
        }

        .dice-unit .back {
            transform: rotateX(-180deg) translateZ(100px);
        }

        .dice-unit .back.inner {
            transform: rotateX(-180deg) translateZ(98px);
        }

        .dice-unit .right {
            transform: rotateY(90deg) translateZ(100px);
        }

        .dice-unit .right.inner {
            transform: rotateY(90deg) translateZ(98px);
        }

        .dice-unit .left {
            transform: rotateY(-90deg) translateZ(100px);
        }

        .dice-unit .left.inner {
            transform: rotateY(-90deg) translateZ(98px);
        }

        .dice-unit .top {
            transform: rotateX(90deg) translateZ(100px);
        }

        .dice-unit .top.inner {
            transform: rotateX(90deg) translateZ(98px);
        }

        .dice-unit .bottom {
            transform: rotateX(-90deg) translateZ(100px);
        }

        .dice-unit .bottom.inner {
            transform: rotateX(-90deg) translateZ(98px);
        }

        .dot {
            position: absolute;
            width: 20%;
            height: 20%;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #e53935 0%, #c62828 50%, #b71c1c 100%);
            box-shadow: inset 0 -2px 4px rgba(0, 0, 0, 0.4);
        }

        .dot.center {
            margin: 40% 0 0 40%;
        }

        .dot.dtop {
            margin-top: 12%;
        }

        .dot.dleft {
            margin-left: 67%;
        }

        .dot.dright {
            margin-left: 12%;
        }

        .dot.dbottom {
            margin-top: 67%;
        }

        .dot.center.dleft {
            margin: 40% 0 0 12%;
        }

        .dot.center.dright {
            margin: 40% 0 0 67%;
        }

        @keyframes spin {
            0% { transform: translateZ(-100px) rotateX(0deg) rotateY(0deg) rotateZ(0deg); }
            20% { transform: translateZ(-100px) rotateX(135deg) rotateY(135deg) rotateZ(0deg); }
            40% { transform: translateZ(-100px) rotateX(270deg) rotateY(70deg) rotateZ(135deg); }
            60% { transform: translateZ(-100px) rotateX(405deg) rotateY(270deg) rotateZ(270deg); }
            80% { transform: translateZ(-100px) rotateX(135deg) rotateY(405deg) rotateZ(200deg); }
            100% { transform: translateZ(-100px) rotateX(270deg) rotateY(270deg) rotateZ(270deg); }
        }

        @keyframes roll {
            0% { transform: translate3d(-37%, -7%, -75%); }
            12.5% { transform: translate3d(0, 0, -22%); }
            25% { transform: translate3d(37%, -7%, -75%); }
            37.5% { transform: translate3d(0, -15%, -112%); }
            50% { transform: translate3d(-37%, -7%, -75%); }
            62.5% { transform: translate3d(0, 0, -22%); }
            75% { transform: translate3d(37%, -7%, -75%); }
            87.5% { transform: translate3d(-22%, -4%, -37%); }
            95% { transform: translate3d(10%, -2%, -17%); }
            100% { transform: translate3d(0, 0, 0); }
        }

        .dice.rolling {
            animation: spin 1.4s ease-out forwards;
        }

        .platform.rolling {
            animation: roll 1.4s ease-out forwards;
        }

        #result {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            bottom: 80px;
            font-size: 20px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.95);
            text-align: center;
            pointer-events: none;
            background: rgba(255, 255, 255, 0.2);
            padding: 8px 16px;
            border-radius: 20px;
        }

        /* 摇骰子时（无结果文字）隐藏容器与背景 */
        #result:empty {
            visibility: hidden;
            background: transparent;
            padding: 0;
        }
    </style>
</head>

<body>
    <div id="wrapper" class="count-1">
        <div class="dice-unit" data-id="0"></div>
        <div class="dice-unit" data-id="1"></div>
        <div class="dice-unit" data-id="2"></div>
    </div>
    <div id="result"></div>

    <script>
        const faceRotations = {
            1: { x: 0, y: 0, z: 0 },
            2: { x: -90, y: 0, z: 0 },
            3: { x: 0, y: -90, z: 0 },
            4: { x: 0, y: 90, z: 0 },
            5: { x: 90, y: 0, z: 0 },
            6: { x: 180, y: 0, z: 0 }
        };

        function createDiceFaces() {
            return `
                <div class="side front"><div class="dot center"></div></div>
                <div class="side front inner"></div>
                <div class="side back">
                    <div class="dot dtop dleft"></div><div class="dot dtop dright"></div>
                    <div class="dot dbottom dleft"></div><div class="dot dbottom dright"></div>
                    <div class="dot center dleft"></div><div class="dot center dright"></div>
                </div>
                <div class="side back inner"></div>
                <div class="side top"><div class="dot dtop dleft"></div><div class="dot dbottom dright"></div></div>
                <div class="side top inner"></div>
                <div class="side bottom">
                    <div class="dot center"></div><div class="dot dtop dleft"></div><div class="dot dtop dright"></div>
                    <div class="dot dbottom dleft"></div><div class="dot dbottom dright"></div>
                </div>
                <div class="side bottom inner"></div>
                <div class="side right"><div class="dot dtop dleft"></div><div class="dot center"></div><div class="dot dbottom dright"></div></div>
                <div class="side right inner"></div>
                <div class="side left">
                    <div class="dot dtop dleft"></div><div class="dot dtop dright"></div>
                    <div class="dot dbottom dleft"></div><div class="dot dbottom dright"></div>
                </div>
                <div class="side left inner"></div>
                <div class="side cover x"></div><div class="side cover y"></div><div class="side cover z"></div>
            `;
        }

        function initUnits() {
            const wrapper = document.getElementById('wrapper');
            const count = getDiceCount();
            const half = getHalf(count);
            const units = wrapper.querySelectorAll('.dice-unit');
            units.forEach(function (unit) {
                unit.innerHTML =
                    '<div class="platform">' +
                    '<div class="dice">' + createDiceFaces() + '</div>' +
                    '</div>';
                const dice = unit.querySelector('.dice');
                dice.style.transform = 'translateZ(-' + half + 'px) rotateX(' + faceRotations[1].x + 'deg) rotateY(' + faceRotations[1].y + 'deg) rotateZ(' + faceRotations[1].z + 'deg)';
            });
        }

        function getDiceCount() {
            try {
                if (window.nativeInterface && typeof window.nativeInterface.getDiceCount === 'function') {
                    const n = window.nativeInterface.getDiceCount();
                    return Math.min(3, Math.max(1, Number(n) || 1));
                }
            } catch (e) {}
            return 1;
        }

        /** 1 颗 200px(half=100)，2/3 颗 120px(half=60) */
        function getHalf(count) {
            return count === 1 ? 100 : 60;
        }

        /** 供原生调用：选择颗数后立即刷新布局，无需等点击 */
        function setDiceCount(n) {
            const count = Math.min(3, Math.max(1, Number(n) || 1));
            const wrapper = document.getElementById('wrapper');
            if (wrapper) {
                wrapper.className = 'count-' + count;
                const half = getHalf(count);
                const units = wrapper.querySelectorAll('.dice-unit');
                units.forEach(function (unit) {
                    const dice = unit.querySelector('.dice');
                    if (dice) {
                        dice.style.transform = 'translateZ(-' + half + 'px) rotateX(' + faceRotations[1].x + 'deg) rotateY(' + faceRotations[1].y + 'deg) rotateZ(' + faceRotations[1].z + 'deg)';
                    }
                });
            }
        }
        window.setDiceCount = setDiceCount;

        let isRolling = false;

        function rollDice() {
            if (isRolling) return;
            const count = getDiceCount();
            const wrapper = document.getElementById('wrapper');
            const resultEl = document.getElementById('result');

            wrapper.className = 'count-' + count;
            resultEl.textContent = '';

            isRolling = true;

            try {
                if (window.nativeInterface && window.nativeInterface.playSound) {
                    window.nativeInterface.playSound();
                }
            } catch (e) {}

            const values = [];
            for (let i = 0; i < count; i++) {
                values.push(Math.floor(Math.random() * 6) + 1);
            }

            const units = wrapper.querySelectorAll('.dice-unit');
            for (let i = 0; i < count; i++) {
                const platform = units[i].querySelector('.platform');
                const dice = units[i].querySelector('.dice');
                platform.classList.add('rolling');
                dice.classList.add('rolling');
            }

            setTimeout(function () {
                for (let i = 0; i < count; i++) {
                    const platform = units[i].querySelector('.platform');
                    const dice = units[i].querySelector('.dice');
                    platform.classList.remove('rolling');
                    dice.classList.remove('rolling');
                    setTimeout(function () {
                        platform.classList.add('settling');
                        dice.classList.add('settling');
                        const r = faceRotations[values[i]];
                        const half = getHalf(count);
                        dice.style.transform = 'translateZ(-' + half + 'px) rotateX(' + r.x + 'deg) rotateY(' + r.y + 'deg) rotateZ(' + r.z + 'deg)';
                        platform.style.transform = 'translate3d(0, 0, 0)';
                    }, 0);
                }

                setTimeout(function () {
                    for (let i = 0; i < count; i++) {
                        const platform = units[i].querySelector('.platform');
                        const dice = units[i].querySelector('.dice');
                        platform.classList.remove('settling');
                        dice.classList.remove('settling');
                    }
                    isRolling = false;

                    const sum = values.reduce(function (a, b) { return a + b; }, 0);
                    if (count === 1) {
                        resultEl.textContent = values[0];
                    } else {
                        resultEl.textContent = values.join(' + ') + ' = ' + sum;
                    }
                }, 600);
            }, 1400);
        }

        document.body.addEventListener('click', rollDice);
        document.body.addEventListener('touchstart', function (e) {
            e.preventDefault();
            rollDice();
        }, { passive: false });

        initUnits();
        /* 初始与原生同步一次 */
        if (window.nativeInterface && typeof window.nativeInterface.getDiceCount === 'function') {
            try {
                var c = window.nativeInterface.getDiceCount();
                setDiceCount(c);
            } catch (e) {}
        }
    </script>
</body>

</html>
